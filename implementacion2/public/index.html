<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Ejercicio JS</title>
</head>

<body id="pagina">

<h2>Ingrese un texto</h2>

<input type="text" id="cajaTexto" placeholder="Escriba algo">

<br><br>

<button onclick="cambiarColor()">Cambiar colores</button>

<script>

let estadoColor = 0;

const colores = [
    {fondo: "white", texto: "black"},
    {fondo: "black", texto: "white"},
    {fondo: "lightblue", texto: "red"}
];

document.getElementById("cajaTexto").addEventListener("keydown", function(event){

    if(event.key === "Enter"){

        let texto = document.getElementById("cajaTexto").value;

        alert("Texto ingresado: " + texto);

    }

});


function cambiarColor(){

    estadoColor++;

    if(estadoColor >= colores.length){
        estadoColor = 0;
    }

    document.body.style.backgroundColor = colores[estadoColor].fondo;
    document.body.style.color = colores[estadoColor].texto;

}

</script>

</body>
</html>
